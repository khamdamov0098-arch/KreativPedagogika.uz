backend:
  name: git-gateway
  branch: main

locale: uz

# PDF va rasmlar shu papkada saqlanadi
media_folder: "pdfs"
public_folder: "/pdfs"

collections:

  # Muallif ma'lumotlari — forma orqali tahrirlash
  - name: "muallif"
    label: "👤 Muallif ma'lumotlari"
    files:
      - label: "Muallif haqida"
        name: "muallif"
        file: "muallif.json"
        fields:
          - { label: "Ism familya", name: "name", widget: "string" }
          - { label: "Lavozim", name: "position", widget: "string" }
          - label: "Rasm (muallif.jpg yoki muallif1.jpg)"
            name: "photo"
            widget: "string"
            hint: "Fayl nomini kiriting: muallif1.jpg"
          - label: "Teglar"
            name: "tags"
            widget: "list"
            field: { label: "Teg", name: "tag", widget: "string" }
          - label: "Statistika"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Umumiy staj (yil)", name: "staj_umumiy", widget: "string" }
              - { label: "Pedagogik staj (yil)", name: "staj_pedagogik", widget: "string" }
              - { label: "Maqolalar soni", name: "maqolalar", widget: "string" }
              - { label: "Tezislar soni", name: "tezislar", widget: "string" }
          - label: "Kontakt"
            name: "kontakt"
            widget: "object"
            fields:
              - { label: "Telefon (+998...)", name: "telefon", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Telegram (https://t.me/...)", name: "telegram", widget: "string" }
